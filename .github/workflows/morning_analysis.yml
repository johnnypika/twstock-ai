name: 盤前分析（第零層 + 第一層 + 第二層）

on:
  schedule:
    # 台灣時間 08:00 = UTC 00:00，週一至週五
    - cron: '0 0 * * 1-5'
  workflow_dispatch:   # 允許手動觸發（方便測試）

jobs:
  morning-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 55   # 最長跑 55 分鐘，保留緩衝

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 下載昨日持倉資料（從 Gist）
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python scripts/gist_sync.py pull

      - name: 第零層：LLM 決定今日策略
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/layer0_strategy.py

      - name: 第一層：規則引擎掃全台股
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/layer1_filter.py

      - name: 第二層：LLM 深度分析推薦
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/layer2_analysis.py

      - name: 上傳分析結果到 Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python scripts/gist_sync.py push

      - name: 更新 GitHub Pages 資料並推送
        run: |
          cp data/recommendations.json web/recommendations.json
          cp data/candidates.json web/candidates.json
          cp data/today_strategy.json web/today_strategy.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/
          git diff --staged --quiet || git commit -m "chore: 更新今日分析資料 $(date -u '+%Y-%m-%d')"
          git push
