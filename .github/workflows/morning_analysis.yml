name: 盤前分析（第零層 + 第一層 + 第二層）

on:
  schedule:
    # ── 第零層：台灣 08:00 = UTC 00:00，讀新聞決定策略 ──
    - cron: '0 0 * * 1-5'
    # ── 第一+二層：台灣 09:10 = UTC 01:10，TWSE 開盤後才有今日報價 ──
    - cron: '10 1 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  morning-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 下載昨日持倉資料（從 Gist）
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python scripts/gist_sync.py pull

      - name: 判斷觸發時間（決定執行哪幾層）
        id: schedule_check
        run: |
          # UTC 00:xx → 台灣 08:xx → 只跑第零層
          # UTC 01:xx → 台灣 09:xx → 跑第一+二層
          # workflow_dispatch 手動觸發 → 全部跑
          HOUR=$(date -u +%H)
          EVENT="${{ github.event_name }}"
          echo "UTC hour: $HOUR, event: $EVENT"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "run_layer0=true"  >> $GITHUB_OUTPUT
            echo "run_layer12=true" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "00" ]; then
            echo "run_layer0=true"  >> $GITHUB_OUTPUT
            echo "run_layer12=false" >> $GITHUB_OUTPUT
          else
            echo "run_layer0=false" >> $GITHUB_OUTPUT
            echo "run_layer12=true" >> $GITHUB_OUTPUT
          fi

      - name: 第零層：LLM 決定今日策略
        if: steps.schedule_check.outputs.run_layer0 == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/layer0_strategy.py

      - name: 第一層：規則引擎掃全台股
        if: steps.schedule_check.outputs.run_layer12 == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/layer1_filter.py

      - name: 第二層：LLM 深度分析推薦
        if: steps.schedule_check.outputs.run_layer12 == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/layer2_analysis.py

      - name: 上傳分析結果到 Gist
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python scripts/gist_sync.py push

      - name: 確認資料檔案狀態
        run: python scripts/update_pages.py

      - name: 推送資料到 GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: 更新今日分析資料 $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
